name: CI — Build & Unit Tests

on:
  push:
    branches: [main, dev, "feat/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x64
          - os: windows-latest
            name: Windows x64

    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libcurl4-openssl-dev nlohmann-json3-dev

      - name: Cache vcpkg (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-${{ hashFiles('vcpkg.json') }}

      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: vcpkg install --triplet x64-windows-static

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DARIADNE_BUILD_TESTS=ON -DARIADNE_BUILD_EXAMPLES=OFF -DARIADNE_BUILD_STUDIO=ON

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $root = if ($env:VCPKG_INSTALLATION_ROOT) { $env:VCPKG_INSTALLATION_ROOT } else { "C:/vcpkg" }
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            "-DCMAKE_TOOLCHAIN_FILE=$root/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DARIADNE_BUILD_TESTS=ON `
            -DARIADNE_BUILD_EXAMPLES=OFF `
            -DARIADNE_BUILD_STUDIO=ON

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Run unit tests
        run: cd build && ctest -C Release --output-on-failure

      - name: Upload on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-tests-${{ matrix.name }}-${{ github.run_number }}
          path: |
            build/unit_tests
            build/Release/unit_tests.exe
          retention-days: 3
