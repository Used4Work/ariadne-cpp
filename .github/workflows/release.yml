name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0)"
        required: true
        default: "v0.2.0"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
            ext: tar.gz
            lib: libariadne.a
          - os: windows-latest
            name: windows-x64
            ext: zip
            lib: Release/ariadne.lib
          - os: macos-latest
            name: macos-arm64
            ext: tar.gz
            lib: libariadne.a

    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libcurl4-openssl-dev nlohmann-json3-dev

      - name: Cache vcpkg (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-release-${{ hashFiles('vcpkg.json') }}

      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: vcpkg install --triplet x64-windows-static

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install curl nlohmann-json

      - name: Configure (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DARIADNE_BUILD_TESTS=OFF \
            -DARIADNE_BUILD_EXAMPLES=OFF

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $root = if ($env:VCPKG_INSTALLATION_ROOT) { $env:VCPKG_INSTALLATION_ROOT } else { "C:/vcpkg" }
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            "-DCMAKE_TOOLCHAIN_FILE=$root/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DARIADNE_BUILD_TESTS=OFF `
            -DARIADNE_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          TAG="${{ github.ref_name }}"
          [ -z "$TAG" ] && TAG="${{ github.event.inputs.tag }}"
          DIST="ariadne-${TAG}-${{ matrix.name }}"
          mkdir -p "${DIST}/include" "${DIST}/lib" "${DIST}/cmake"
          cp ariadne.hpp "build/${{ matrix.lib }}" "${DIST}/include/" 2>/dev/null || true
          cp "build/${{ matrix.lib }}" "${DIST}/lib/"
          cp ariadne.hpp "${DIST}/include/"
          cp README.md LICENSE "${DIST}/"
          printf 'if(NOT TARGET ariadne::ariadne)
  add_library(ariadne::ariadne STATIC IMPORTED)
  get_filename_component(_d "${CMAKE_CURRENT_LIST_DIR}" PATH)
  set_target_properties(ariadne::ariadne PROPERTIES
    IMPORTED_LOCATION "${_d}/lib/libariadne.a"
    INTERFACE_INCLUDE_DIRECTORIES "${_d}/include")
endif()
' > "${DIST}/cmake/ariadne-config.cmake"
          tar -czf "ariadne-${TAG}-${{ matrix.name }}.tar.gz" "${DIST}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = if ("${{ github.ref_name }}" -ne "") { "${{ github.ref_name }}" } else { "${{ github.event.inputs.tag }}" }
          $dist = "ariadne-$tag-windows-x64"
          New-Item -ItemType Directory -Path "$dist\include","$dist\lib","$dist